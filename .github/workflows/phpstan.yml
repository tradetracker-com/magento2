name: Upgrade, Compile and PHPStan
on:
  pull_request:
    paths:
      - '**/*.php'
      - '**/*.xml'
      - 'composer.json'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - PHP_VERSION: php81-fpm
            MAGENTO_VERSION: 2.4.6-p4
          - PHP_VERSION: php83-fpm
            MAGENTO_VERSION: 2.4.7
          - PHP_VERSION: php84-fpm
            MAGENTO_VERSION: 2.4.8-p4
          - PHP_VERSION: php85-fpm
            MAGENTO_VERSION: 2.4.9
    name: PHP ${{ matrix.PHP_VERSION }} Magento ${{ matrix.MAGENTO_VERSION }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start Docker
        run: docker run --detach --name magento-project-community-edition michielgerritsen/magento-project-community-edition:${{ matrix.PHP_VERSION }}-magento${{ matrix.MAGENTO_VERSION }}

      - name: Remove version from composer.json
        run: sed -i '/version/d' ./composer.json

      - name: Upload our code into the docker container
        run: docker cp $(pwd) magento-project-community-edition:/data/extensions/

      - name: Install the extensions in Magento
        run: docker exec magento-project-community-edition ./install-composer-package tradetracker-com/magento2:@dev

      - name: Activate the extension
        run: docker exec magento-project-community-edition ./retry "php bin/magento module:enable TradeTracker_Connect && php bin/magento setup:upgrade && php bin/magento setup:di:compile"

      - name: Run PHPStan
        run: docker exec magento-project-community-edition /bin/bash -c "./vendor/bin/phpstan analyse --no-progress -c /data/extensions/*/phpstan.neon /data/extensions"
